<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goblet Life Simulation</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: Arial, sans-serif;
            color: #eee;
        }
        canvas {
            display: block;
            background: #1a1a1a;
        }
        .info {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }
        .controls {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 14px;
            border-radius: 8px;
            z-index: 10;
        }
        .controls .speed-caption {
            font-size: 13px;
            color: #ccc;
        }
        .controls .speed-readout {
            font-size: 14px;
            font-variant-numeric: tabular-nums;
            color: #60a5fa;
            min-width: 52px;
            text-align: right;
        }
        #speedSlider {
            -webkit-appearance: none;
            appearance: none;
            width: 260px;
            height: 5px;
            border-radius: 3px;
            background: #444;
            outline: none;
            cursor: pointer;
        }
        #speedSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #2563eb;
            border: 2px solid #60a5fa;
            cursor: pointer;
        }
        #speedSlider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #2563eb;
            border: 2px solid #60a5fa;
            cursor: pointer;
        }
        .controls button {
            background: #2a2a2a;
            color: #eee;
            border: 1px solid #555;
            border-radius: 5px;
            padding: 6px 12px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
        }
        .controls button:hover {
            background: #3a3a3a;
        }
        .controls button.active {
            background: #2563eb;
            border-color: #60a5fa;
            color: #fff;
        }
        #inspector {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 220px;
            font-size: 13px;
            line-height: 1.5;
            background: rgba(0,0,0,0.82);
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 10;
            display: none;
        }
        #inspector h3 {
            margin: 0 0 8px 0;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #inspector .swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid #666;
            display: inline-block;
        }
        #inspector .row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        #inspector .row span:last-child {
            color: #9cf;
            font-variant-numeric: tabular-nums;
        }
        #inspector .close {
            position: absolute;
            top: 8px;
            right: 10px;
            cursor: pointer;
            color: #999;
            font-size: 16px;
            line-height: 1;
        }
        #inspector .close:hover { color: #fff; }
        #graphsBtn {
            position: fixed;
            top: 92px;
            left: 10px;
            z-index: 10;
            background: #2a2a2a;
            color: #eee;
            border: 1px solid #555;
            border-radius: 5px;
            padding: 6px 14px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
        }
        #graphsBtn:hover { background: #3a3a3a; }
        #graphsBtn.active {
            background: #2563eb;
            border-color: #60a5fa;
            color: #fff;
        }
        #graphPanel {
            position: fixed;
            top: 130px;
            left: 10px;
            width: 564px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            background: rgba(0,0,0,0.82);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            z-index: 10;
            display: none;
        }
        #graphPanel .graph-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        #graphCanvas {
            display: block;
            width: 540px;
            height: 380px;
            background: #141414;
            border-radius: 4px;
        }
        #infectedCanvas {
            display: block;
            width: 540px;
            height: 150px;
            background: #141414;
            border-radius: 4px;
        }
        #infectedReadout {
            margin-top: 6px;
            font-size: 13px;
            color: #ef4444;
            font-variant-numeric: tabular-nums;
        }
        #graphLegend {
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.5;
        }
        #graphLegend .leg {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 12px;
            white-space: nowrap;
        }
        #graphLegend .dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            display: inline-block;
        }
        #pausedTag {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #fbbf24;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        <div>Population: <span id="population">0</span></div>
        <div>Time: <span id="time">0s</span></div>
        <div>Speed: <span id="speedLabel">1x</span></div>
    </div>
    <button id="graphsBtn">Graphs</button>
    <div id="graphPanel">
        <div class="graph-title">Population by family name</div>
        <canvas id="graphCanvas" width="540" height="380"></canvas>
        <div id="graphLegend"></div>
        <div class="graph-title" style="margin-top:12px;">Infected</div>
        <canvas id="infectedCanvas" width="540" height="150"></canvas>
        <div id="infectedReadout"></div>
    </div>
    <div class="controls" id="controls"></div>
    <div id="pausedTag">⏸ PAUSED (space)</div>
    <div id="inspector">
        <span class="close" id="inspectorClose">×</span>
        <h3><span class="swatch" id="insSwatch"></span> Goblet <span id="insId"></span></h3>
        <div class="row"><span>Name</span><span id="insName"></span></div>
        <div class="row"><span>Generation</span><span id="insGen"></span></div>
        <div class="row"><span>Gender</span><span id="insGender"></span></div>
        <div class="row"><span>Age</span><span id="insAge"></span></div>
        <div class="row"><span>Status</span><span id="insStatus"></span></div>
        <div class="row"><span>Hunger</span><span id="insHunger"></span></div>
        <div class="row"><span>Thirst</span><span id="insThirst"></span></div>
        <hr style="border-color:#333;margin:8px 0;">
        <div class="row"><span>Color RGB</span><span id="insColor"></span></div>
        <div class="row"><span>Sight range</span><span id="insSight"></span></div>
        <div class="row"><span>Speed</span><span id="insSpeed"></span></div>
        <div class="row"><span>Adult size</span><span id="insSize"></span></div>
        <div class="row"><span>Current size</span><span id="insCurSize"></span></div>
        <div class="row"><span>Gene score</span><span id="insScore"></span></div>
        <div class="row"><span>Immunity</span><span id="insImmunity"></span></div>
    </div>

    <script>
        // ============================================================================
        // CONSTANTS
        // ============================================================================
        const WORLD_WIDTH = 1700;
        const WORLD_HEIGHT = 1300;
        const HUNGER_DECAY_RATE = 0.7;
        const THIRST_DECAY_RATE = 0.7;
        const HUNGER_THRESHOLD = 55;
        const THIRST_THRESHOLD = 55;
        const APPLE_REGROW_SECONDS = 20;
        const MAX_APPLES_PER_BUSH = 3;
        const GOBLET_SIZE = 24;
        const BUSH_SIZE = 60;
        const BERRY_SIZE = 50;
        const WANDER_FORCE = 0.5;
        const EAT_DURATION = 1.0;
        const DRINK_DURATION = 1.0;
        const MATE_DURATION = 3.0;
        
        // Reproduction constants
        const FEMALE_REPRO_THRESHOLD = 75;
        const MALE_REPRO_THRESHOLD = 75;
        const MIN_CHILD_SIZE = 6;
        const MAX_CHILD_SIZE = 10;
        const REPRO_COOLDOWN = 10;
        const GROW_TIME_SECONDS = 200;
        const EAT_GROWTH_BONUS = 15;
        const REPRO_MAX_AGE = 2500;
        const AGING_RATE = 0.1;
        const AGING_FLOOR = 0.15;
        
        const BERRY_POSITIONS = [
            { dx: -0.22, dy: 0.06 },
            { dx: 0.14, dy: -0.10 },
            { dx: 0.11, dy: 0.24 }
        ];

        // ============================================================================
        // WORLD STATE
        // ============================================================================
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let goblets = [];
        let bushes = [];
        let growingBushes = [];
        let pendingPoops = [];
        let grasses = [];
        let lakes = [];
        const POOP_DELAY = 70;
        const POOP_SPROUT_CHANCE = 0.33;
        // A poop can only sprout if no other bush (grown OR still growing) is
        // within this many world-units. Raise it to spread bushes out more,
        // lower it to let them cluster. Measured center-to-center.
        const BUSH_MIN_SPACING = 65;
        const BUSH_STAGE_DURATION = 20;
        const BUSH_STAGES = ['poop', 'bush1', 'bush2', 'bush3', 'bush4'];
        const GROWING_BUSH_SIZES = { poop: 20, bush1: 25, bush2: 35, bush3: 45, bush4: 60 };
        const GRASS_SIZE = 25;
        let gameTime = 0;
        let nextGobletId = 1;
        let selectedGobletId = null;
        let paused = false;

        // Camera
        let camera = {
            x: 0, y: 0,
            zoom: 1,
            minZoom: 0.5,
            maxZoom: 6
        };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };

        // Assets
        let assets = {
            bush: null,
            berry: null,
            humanOutline: null,
            femaleOutline: null,
            humanSkin: null
        };

        // Goblets only render ~30px on screen, so tinting at the source 800x800
        // wasted ~2.5MB per color. Cap the tinted canvas to this size to keep
        // the cache tiny (~64KB per entry) — otherwise accumulating unique
        // mutated colors blew memory into the gigabytes and caused GC lag.
        const TINT_SIZE = 128;
        function tintSilhouette(img, color) {
            let w = img.naturalWidth || img.width;
            let h = img.naturalHeight || img.height;
            let scale = Math.min(1, TINT_SIZE / Math.max(w, h, 1));
            let ow = Math.max(1, Math.round(w * scale));
            let oh = Math.max(1, Math.round(h * scale));
            let off = document.createElement('canvas');
            off.width = ow;
            off.height = oh;
            let octx = off.getContext('2d');
            octx.drawImage(img, 0, 0, ow, oh);
            octx.globalCompositeOperation = 'source-in';
            octx.fillStyle = color;
            octx.fillRect(0, 0, ow, oh);
            return off;
        }

        let skinCache = {};
        function getTintedSkin(color) {
            // Quantize to the nearest 8 per channel so near-identical mutated
            // shades share one cached canvas — bounds the cache to a few dozen
            // entries instead of one per goblet.
            let qr = (color.r | 0) & ~7, qg = (color.g | 0) & ~7, qb = (color.b | 0) & ~7;
            let key = qr + ',' + qg + ',' + qb;
            if (!skinCache[key]) {
                skinCache[key] = tintSilhouette(assets.humanSkin, `rgb(${qr},${qg},${qb})`);
            }
            return skinCache[key];
        }

        function loadAssets() {
            return Promise.all([
                new Promise(resolve => {
                    assets.bush = new Image();
                    assets.bush.src = 'assets/bush4.png';
                    assets.bush.onload = resolve;
                    assets.bush.onerror = () => { console.warn('bush4.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.berry = new Image();
                    assets.berry.src = 'assets/berry.png';
                    assets.berry.onload = resolve;
                    assets.berry.onerror = () => { console.warn('berry.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.humanOutline = new Image();
                    assets.humanOutline.src = 'assets/human-outline.png';
                    assets.humanOutline.onload = resolve;
                    assets.humanOutline.onerror = () => { console.warn('human-outline.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.femaleOutline = new Image();
                    assets.femaleOutline.src = 'assets/female-human-outline.png';
                    assets.femaleOutline.onload = resolve;
                    assets.femaleOutline.onerror = () => { console.warn('female-human-outline.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.humanSkin = new Image();
                    assets.humanSkin.src = 'assets/human-skin.png';
                    assets.humanSkin.onload = () => {
                        resolve();
                    };
                    assets.humanSkin.onerror = () => {
                        console.warn('human-skin.png not found, creating fallback');
                        let c = document.createElement('canvas');
                        c.width = 48;
                        c.height = 48;
                        let cx = c.getContext('2d');
                        cx.fillStyle = 'white';
                        cx.beginPath();
                        cx.arc(24, 16, 12, 0, Math.PI * 2);
                        cx.fill();
                        cx.fillRect(18, 26, 12, 14);
                        assets.humanSkin = c;
                        resolve();
                    };
                }),
                new Promise(resolve => {
                    assets.hearts = new Image();
                    assets.hearts.src = 'assets/hearts.png';
                    assets.hearts.onload = resolve;
                    assets.hearts.onerror = () => { console.warn('hearts.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.poop = new Image();
                    assets.poop.src = 'assets/poop.png';
                    assets.poop.onload = resolve;
                    assets.poop.onerror = () => { console.warn('poop.png not found'); resolve(); };
                }),
                new Promise((resolve) => {
                    assets.grass = new Image();
                    assets.grass.src = 'assets/grass.png';
                    assets.grass.onload = resolve;
                    assets.grass.onerror = () => { console.warn('grass.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.bush1 = new Image();
                    assets.bush1.src = 'assets/bush1.png';
                    assets.bush1.onload = resolve;
                    assets.bush1.onerror = () => { console.warn('bush1.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.bush2 = new Image();
                    assets.bush2.src = 'assets/bush2.png';
                    assets.bush2.onload = resolve;
                    assets.bush2.onerror = () => { console.warn('bush2.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.bush3 = new Image();
                    assets.bush3.src = 'assets/bush3.png';
                    assets.bush3.onload = resolve;
                    assets.bush3.onerror = () => { console.warn('bush3.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.toxicberry = new Image();
                    assets.toxicberry.src = 'assets/toxicberry.png';
                    assets.toxicberry.onload = resolve;
                    assets.toxicberry.onerror = () => { console.warn('toxicberry.png not found'); resolve(); };
                }),
                new Promise(resolve => {
                    assets.disease = new Image();
                    assets.disease.src = 'assets/disease.png';
                    assets.disease.onload = resolve;
                    assets.disease.onerror = () => { console.warn('disease.png not found'); resolve(); };
                })
            ]);
        }

        // ============================================================================
        // GENETICS
        // ============================================================================
        const ADULT_SIZE_MIN = 18, ADULT_SIZE_MAX = 50;
        const SPEED_REF = 55;
        const SIZE_REF  = 24;
        
        function metabolism(g) {
            return (g.genes.speed / SPEED_REF) * 0.6 + (g.currentSize / SIZE_REF) * 0.4;
        }

        const GENE_W_SIGHT = 1.0;
        const GENE_W_SPEED = 0.4;
        const GENE_W_SIZE  = 0.6;
        function geneQuality(g) {
            return (g.genes.sightRange / 100) * GENE_W_SIGHT
                 + (g.genes.speed / SPEED_REF) * GENE_W_SPEED
                 - (g.genes.size / SIZE_REF) * GENE_W_SIZE;
        }

        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

        function gaussianRandom() {
            let u1 = Math.random() || 1e-9;
            let u2 = Math.random();
            return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
        }

        const MACRO_MUTATION_CHANCE = 0.04;
        function deviation(amount) {
            let z = gaussianRandom();
            if (Math.random() < MACRO_MUTATION_CHANCE) {
                z *= 4 + Math.abs(gaussianRandom()) * 6;
            }
            return z * amount;
        }

        const SPAWN_COLORS = [
            { r: 220, g: 30,  b: 30  },  // red   - faster
            { r: 30,  g: 180, b: 30  },  // green - smallest
            { r: 30,  g: 60,  b: 220 }   // blue  - keener sight
        ];
        function colorToCss(c) { return `rgb(${c.r|0}, ${c.g|0}, ${c.b|0})`; }

        // One family name per starting colour (index-matched to SPAWN_COLORS).
        // These act like surnames: a child inherits its father's name, so a
        // whole lineage keeps its founder-colour surname regardless of drift.
        const FAMILY_NAMES = ["Redson", "Greenson", "Blueson"];

        // The founder's surname is decided by its spawn colour.
        function familyNameForColor(color) {
            for (let i = 0; i < SPAWN_COLORS.length; i++) {
                let c = SPAWN_COLORS[i];
                if (c.r === color.r && c.g === color.g && c.b === color.b) return FAMILY_NAMES[i];
            }
            return FAMILY_NAMES[0];
        }

        // ============================================================================
        // DISEASE
        // ============================================================================
        const TOXIC_BUSH_CHANCE = 0.01;   // 1 in 100 bushes spawns toxic
        const TOXIC_BUSH_MAX_PICKS = 3;   // toxic bush vanishes after 3 berries eaten
        const SICK_DURATION = 250;        // seconds a goblet stays sick
        const SICK_SPEED_MULT = 0.3;     // 0.25 speed debuff while sick
        const BASE_DEATH_CHANCE = 0.8;    // 1-in-2 chance of dying from an infection
        const IMMUNITY_GAIN = 0.01;        // survivors gain this much resistance (a gene)
        const POOP_INFECT_RADIUS = 27;    // infectious-poop contagion range

        // ============================================================================
        // COMBAT — being bigger is a survival perk: big goblets can eat babies and
        // defend their own young.
        // ============================================================================
        const PANIC_THRESHOLD = 10;          // hunger/thirst level that triggers panic
        const ATTACK_RANGE = 45;             // px within which a goblet can strike
        const ATTACK_COOLDOWN = 2;           // seconds between a goblet's attacks
        const ATTACK_DAMAGE_PER_SIZE = 0.6;  // damage scales with body size
        const HIT_FLASH_DURATION = 1;        // seconds a struck goblet flashes white
        const AGGRO_DURATION = 6;            // seconds a fight stays hot without a hit
        const HEAL_THRESHOLD = 85;           // hunger & thirst both above this to heal
        const HEAL_RATE = 4;                 // HP regained per second when well-fed
        const HP_PER_SIZE = 2.5;             // max HP scales with body size

        // Bigger goblets have a bigger HP pool.
        function maxHp(g) { return Math.max(1, g.currentSize * HP_PER_SIZE); }

        function inPanic(g) { return g.hunger <= PANIC_THRESHOLD || g.thirst <= PANIC_THRESHOLD; }
        function attackDamage(g) { return Math.max(1, g.currentSize * ATTACK_DAMAGE_PER_SIZE); }

        // A panicking adult hunts the nearest baby it can see for food — but
        // never its own child.
        function findBabyPrey(hunter) {
            let best = null, bestDist = hunter.genes.sightRange;
            for (let other of goblets) {
                if (other === hunter || other.isGrown || other.hp <= 0) continue;
                if (other.parents && other.parents.includes(hunter.id)) continue;  // spare own kids
                let d = Math.hypot(hunter.x - other.x, hunter.y - other.y);
                if (d < bestDist) { bestDist = d; best = other; }
            }
            return best;
        }

        // Land a blow: size-based damage, flash the victim, provoke retaliation,
        // and rally the victim's father to its defense.
        function attack(attacker, victim) {
            victim.hp -= attackDamage(attacker);
            victim.hitFlashUntil = gameTime + HIT_FLASH_DURATION;
            attacker.nextAttackTime = gameTime + ATTACK_COOLDOWN;
            attacker.combatUntil = gameTime + AGGRO_DURATION;

            // Victim fights back.
            victim.combatTarget = attacker;
            victim.combatUntil = gameTime + AGGRO_DURATION;

            // The victim's father charges in to protect his child.
            if (!victim.isGrown && victim.fatherId != null) {
                for (let g of goblets) {
                    if (g.id === victim.fatherId) {
                        g.combatTarget = attacker;
                        g.combatUntil = gameTime + AGGRO_DURATION;
                        break;
                    }
                }
            }

            // Death: a slain baby feeds its killer (food and water both restored).
            if (victim.hp <= 0) {
                victim.dead = true;
                if (!victim.isGrown) { attacker.hunger = 100; attacker.thirst = 100; }
            }
        }

        // Drop a fight when the foe is gone or the fight has gone cold.
        function validateCombatTarget(g) {
            let t = g.combatTarget;
            if (!t) return;
            if (t.dead || t.hp <= 0 || gameTime > (g.combatUntil || 0)) {
                g.combatTarget = null;
            }
        }

        function createGenes() {
            let idx = Math.floor(Math.random() * SPAWN_COLORS.length);
            let base = SPAWN_COLORS[idx];

            // baseline stat ranges
            let sightRange = 80 + Math.random() * 40;   // [80, 120]
            let speed      = 40 + Math.random() * 30;   // [40, 70]
            let size = ADULT_SIZE_MIN + Math.random() * (ADULT_SIZE_MAX - ADULT_SIZE_MIN); // [18, 50]

            // colour-specific spawn qualities
            if (idx === 0) {          // red: higher speed
                speed = 70 + Math.random() * 30;                    // [70, 100]
            } else if (idx === 1) {   // green: smallest size
                size = ADULT_SIZE_MIN + Math.random() * 10;         // [18, 28]
            } else if (idx === 2) {   // blue: higher viewing range
                sightRange = 130 + Math.random() * 40;              // [130, 170]
            }

            return {
                color: { r: base.r, g: base.g, b: base.b },
                sightRange: sightRange,
                speed: speed,
                size: size,
                immunity: 0   // disease resistance gene; rises when surviving illness
            };
        }

        function inheritGenes(parent1, parent2) {
            const deviate = (avg, amount) => avg + deviation(amount);

            let avgSight = (parent1.genes.sightRange + parent2.genes.sightRange) / 2;
            let avgSpeed = (parent1.genes.speed + parent2.genes.speed) / 2;
            let avgSize  = (parent1.genes.size + parent2.genes.size) / 2;

            let c1 = parent1.genes.color, c2 = parent2.genes.color;
            let color = {
                r: clamp(Math.round((c1.r + c2.r) / 2 + deviation(20)), 0, 255),
                g: clamp(Math.round((c1.g + c2.g) / 2 + deviation(20)), 0, 255),
                b: clamp(Math.round((c1.b + c2.b) / 2 + deviation(20)), 0, 255)
            };

            // Immunity is inherited: a child of survivors carries their resistance.
            let avgImmunity = ((parent1.genes.immunity || 0) + (parent2.genes.immunity || 0)) / 2;

            return {
                color: color,
                sightRange: Math.max(1, deviate(avgSight, 8)),
                speed:      Math.max(1, deviate(avgSpeed, 5)),
                size:       Math.max(1, deviate(avgSize, 3)),
                immunity:   clamp(avgImmunity, 0, BASE_DEATH_CHANCE)
            };
        }

        // Children conceived while a parent is sick suffer a randomized genetic
        // DEBUFF — one stat gets worse. Magnitude has a heavy tail
        // (Math.random()^3) so tiny debuffs are common and radical ones are rare.
        // Returns a description for logging.
        const PLAGUE_DEBUFF_MAX = 0.6;   // up to -60% (or equivalent) on the picked gene
        function applyPlagueDebuff(genes) {
            let pct = Math.pow(Math.random(), 3) * PLAGUE_DEBUFF_MAX;   // mostly small, rarely big
            let pick = Math.floor(Math.random() * 4);
            let gene;
            if (pick === 0) { genes.sightRange = Math.max(1, genes.sightRange * (1 - pct)); gene = 'sight'; }
            else if (pick === 1) { genes.speed = Math.max(1, genes.speed * (1 - pct)); gene = 'speed'; }
            else if (pick === 2) { genes.size = genes.size * (1 + pct); gene = 'size'; } // bigger is worse
            else { genes.immunity = clamp((genes.immunity || 0) - pct * BASE_DEATH_CHANCE, 0, BASE_DEATH_CHANCE); gene = 'immunity'; }
            return { gene, pct };
        }

        // ============================================================================
        // WORLD SETUP
        // ============================================================================
        function setupWorld() {
            // Fixed layout: 5 lakes — one in each corner and one in the middle.
            const LAKE_RADIUS = 75;
            let lakePoints = [
                { x: 240,  y: 240  },  // top-left
                { x: WORLD_WIDTH - 240, y: 240 },              // top-right
                { x: 240,  y: WORLD_HEIGHT - 240 },            // bottom-left
                { x: WORLD_WIDTH - 240, y: WORLD_HEIGHT - 240 }, // bottom-right
                { x: WORLD_WIDTH / 2, y: WORLD_HEIGHT / 2 }     // middle
            ];
            lakes = lakePoints.map(p => ({ x: p.x, y: p.y, radius: LAKE_RADIUS }));

            // Fixed layout: 4 bushes at the edge midpoints (top, bottom, left,
            // right) plus 1 bush in each map corner.
            const CB = 90;  // corner bush inset from the map edge
            let bushPoints = [
                { x: WORLD_WIDTH / 2, y: 240 },                 // top
                { x: WORLD_WIDTH / 2, y: WORLD_HEIGHT - 240 },  // bottom
                { x: 240, y: WORLD_HEIGHT / 2 },                // left
                { x: WORLD_WIDTH - 240, y: WORLD_HEIGHT / 2 },  // right
                { x: CB, y: CB },                               // top-left corner
                { x: WORLD_WIDTH - CB, y: CB },                 // top-right corner
                { x: CB, y: WORLD_HEIGHT - CB },                // bottom-left corner
                { x: WORLD_WIDTH - CB, y: WORLD_HEIGHT - CB }   // bottom-right corner
            ];
            bushes = bushPoints.map(p => ({ x: p.x, y: p.y, radius: 30, apples: 3, lastRegrow: 0, picked: 0, bornAt: 0, toxic: Math.random() < TOXIC_BUSH_CHANCE, toxicPicked: 0 }));

            // Founders take the surname of their spawn colour, passed down the
            // male line thereafter.
            for (let i = 0; i < 250; i++) spawnGoblet('male');
            for (let i = 0; i < 250; i++) spawnGoblet('female');
        }

        function spawnGoblet(gender, name) {
            let x, y, valid;
            let attempts = 0;
            do {
                valid = true;
                attempts++;
                x = Math.random() * (WORLD_WIDTH - 100) + 50;
                y = Math.random() * (WORLD_HEIGHT - 100) + 50;

                for (let lake of lakes) {
                    let dist = Math.hypot(x - lake.x, y - lake.y);
                    if (dist < lake.radius + GOBLET_SIZE) {
                        valid = false;
                        break;
                    }
                }
            } while (!valid && attempts < 50);

            let genes = createGenes();
            let goblet = {
                x: x, y: y,
                vx: 0, vy: 0,
                hunger: 53,
                thirst: 53,
                hp: genes.size * HP_PER_SIZE,
                genes: genes,
                currentSize: genes.size,
                state: 'idle',
                targetX: null,
                targetY: null,
                wanderAngle: Math.random() * Math.PI * 2,
                lastWanderChange: gameTime,
                isActing: false,
                actionTimer: 0,
                reproCooldown: 0,
                bobPhase: Math.random() * Math.PI * 2,
                isGrown: true,
                restUntil: undefined,
                id: nextGobletId++,
                name: name || familyNameForColor(genes.color),
                generation: 1,
                gender: gender || (Math.random() < 0.5 ? 'male' : 'female'),
                parents: [],
                age: 0,
                baseSightRange: genes.sightRange,
                baseSpeed: genes.speed,
                berriesEaten: 0,
                sick: false,
                sickUntil: 0,
                everInfected: false,
                combatTarget: null,
                nextAttackTime: 0,
                hitFlashUntil: 0
            };
            goblets.push(goblet);
            return goblet;
        }

        // Infect a goblet: it becomes sick for SICK_DURATION. No effect if it's
        // already sick, or if it has ever been infected before — surviving (or
        // just catching) the disease once grants lifelong immunity to reinfection.
        // Its fate (survive vs die) is rolled when the illness ends.
        function infect(goblet) {
            if (goblet.sick || goblet.everInfected) return;
            goblet.sick = true;
            goblet.everInfected = true;
            goblet.sickUntil = gameTime + SICK_DURATION;
        }

        // ============================================================================
        // REPRODUCTION
        // ============================================================================
        function canReproduce(g) {
            let threshold = g.gender === 'female' ? FEMALE_REPRO_THRESHOLD : MALE_REPRO_THRESHOLD;
            return g.isGrown &&
                   g.age < REPRO_MAX_AGE &&
                   g.reproCooldown <= 0 &&
                   g.hunger >= threshold &&
                   g.thirst >= threshold;
        }

        function findMate(goblet) {
            if (!canReproduce(goblet)) return null;

            let bestMate = null;
            let bestColorDist = Infinity;
            let bestDist = Infinity;
            let sight = goblet.genes.sightRange;
            let c = goblet.genes.color;

            for (let other of goblets) {
                if (other === goblet) continue;
                if (!canReproduce(other)) continue;
                if (other.gender === goblet.gender) continue;

                let dist = Math.hypot(goblet.x - other.x, goblet.y - other.y);
                if (dist > sight) continue;

                // Prefer the visible partner whose color is closest to our own;
                // ties broken by proximity.
                let oc = other.genes.color;
                let cd = Math.hypot(c.r - oc.r, c.g - oc.g, c.b - oc.b);
                if (cd < bestColorDist || (cd === bestColorDist && dist < bestDist)) {
                    bestColorDist = cd;
                    bestDist = dist;
                    bestMate = other;
                }
            }

            return bestMate;
        }

        function reproduce(goblet1, goblet2) {
            goblet1.hunger -= 18;
            goblet1.thirst -= 18;
            goblet2.hunger -= 18;
            goblet2.thirst -= 18;

            goblet1.reproCooldown = REPRO_COOLDOWN;
            goblet2.reproCooldown = REPRO_COOLDOWN;

            goblet1.isActing = true;
            goblet1.isMating = true;
            goblet1.actionTimer = MATE_DURATION;
            goblet1.vx = 0; goblet1.vy = 0;
            goblet2.isActing = true;
            goblet2.isMating = true;
            goblet2.actionTimer = MATE_DURATION;
            goblet2.vx = 0; goblet2.vy = 0;

            let childGenes = inheritGenes(goblet1, goblet2);

            // Conceived during illness: the child inherits a randomized genetic
            // debuff (one stat worsened; radical ones are rare).
            if (goblet1.sick || goblet2.sick) {
                applyPlagueDebuff(childGenes);
            }

            // Spawn the baby right on top of its parents (their midpoint), with
            // just a tiny random jitter so it isn't perfectly stacked on them.
            let angle = Math.random() * Math.PI * 2;
            let distance = Math.random() * 6;
            let x = (goblet1.x + goblet2.x) / 2 + Math.cos(angle) * distance;
            let y = (goblet1.y + goblet2.y) / 2 + Math.sin(angle) * distance;
            
            x = Math.max(GOBLET_SIZE, Math.min(WORLD_WIDTH - GOBLET_SIZE, x));
            y = Math.max(GOBLET_SIZE, Math.min(WORLD_HEIGHT - GOBLET_SIZE, y));
            
            for (let lake of lakes) {
                let dist = Math.hypot(x - lake.x, y - lake.y);
                if (dist < lake.radius + GOBLET_SIZE) {
                    for (let attempt = 0; attempt < 10; attempt++) {
                        let newAngle = Math.random() * Math.PI * 2;
                        let newDist = 20 + Math.random() * 30;
                        let testX = (goblet1.x + goblet2.x) / 2 + Math.cos(newAngle) * newDist;
                        let testY = (goblet1.y + goblet2.y) / 2 + Math.sin(newAngle) * newDist;
                        let testDist = Math.hypot(testX - lake.x, testY - lake.y);
                        if (testDist > lake.radius + GOBLET_SIZE) {
                            x = testX;
                            y = testY;
                            break;
                        }
                    }
                }
            }
            
            let startSize = MIN_CHILD_SIZE + Math.random() * (MAX_CHILD_SIZE - MIN_CHILD_SIZE);
            if (childGenes.size <= startSize) childGenes.size = startSize + 4;

            let child = {
                x: x, y: y,
                vx: 0, vy: 0,
                hunger: 100,
                thirst: 100,
                hp: startSize * HP_PER_SIZE,
                genes: childGenes,
                currentSize: startSize,
                birthSize: startSize,
                state: 'idle',
                targetX: null,
                targetY: null,
                wanderAngle: Math.random() * Math.PI * 2,
                lastWanderChange: gameTime,
                isActing: false,
                actionTimer: 0,
                reproCooldown: 0,
                bobPhase: Math.random() * Math.PI * 2,
                isGrown: false,
                restUntil: undefined,
                id: nextGobletId++,
                // Surname passes down the father (male) line.
                name: (goblet1.gender === 'male' ? goblet1.name : goblet2.name),
                generation: Math.max(goblet1.generation, goblet2.generation) + 1,
                gender: Math.random() < 0.5 ? 'male' : 'female',
                parents: [goblet1.id, goblet2.id],
                fatherId: (goblet1.gender === 'male' ? goblet1.id : goblet2.id),
                age: 0,
                baseSightRange: childGenes.sightRange,
                baseSpeed: childGenes.speed,
                berriesEaten: 0,
                sick: false,
                sickUntil: 0,
                everInfected: false,
                combatTarget: null,
                nextAttackTime: 0,
                hitFlashUntil: 0
            };

            goblets.push(child);

            // Disease spreads through mating: a sick parent infects the partner
            // and the newborn child.
            if (goblet1.sick || goblet2.sick) {
                infect(goblet1);
                infect(goblet2);
                infect(child);
            }
        }

        // True if a new bush is allowed to sprout at (x, y): no existing bush,
        // and no other still-growing bush that will sprout, within BUSH_MIN_SPACING.
        function bushSpotClear(x, y) {
            for (let b of bushes) {
                if (Math.hypot(x - b.x, y - b.y) < BUSH_MIN_SPACING) return false;
            }
            for (let gb of growingBushes) {
                if (gb.willSprout && Math.hypot(x - gb.x, y - gb.y) < BUSH_MIN_SPACING) return false;
            }
            return true;
        }

        function agingFactor(age) {
            // Stats stay at full strength for the whole fertile lifespan; only
            // once a goblet becomes infertile (age >= REPRO_MAX_AGE) do its
            // sight and speed begin to decline. This prevents aging from
            // dragging down the genes of still-breeding adults (and, via mate
            // choice, their offspring).
            if (age < REPRO_MAX_AGE) return 1;
            return Math.max(AGING_FLOOR, 1 - (age - REPRO_MAX_AGE) * AGING_RATE);
        }

        // ============================================================================
        // IMPROVED NAVIGATION - FIX FOR LAKE STUCK ISSUE
        // ============================================================================
        
        // Check if a point is inside any lake
        function isPointInLake(px, py, margin) {
            margin = margin || 0;
            for (let lake of lakes) {
                if (Math.hypot(px - lake.x, py - lake.y) < lake.radius + margin) {
                    return true;
                }
            }
            return false;
        }

        // Check if heading is blocked by world border or lake (when not thirsty)
        // Lakes are obstacles to route around EXCEPT when a goblet is actively
        // heading in to drink. The world border is always an obstacle.
        function goingToDrink(g) { return g.state === 'seekingWater' && !g.combatTarget; }

        function headingBlocked(goblet, angle, maxDist) {
            let sr = maxDist !== undefined ? maxDist : goblet.genes.sightRange;
            let ca = Math.cos(angle), sa = Math.sin(angle);
            let avoidLakes = !goingToDrink(goblet);
            let step = 10;
            let margin = GOBLET_SIZE / 2 + 3;
            
            for (let d = step; d <= sr; d += step) {
                let px = goblet.x + ca * d;
                let py = goblet.y + sa * d;
                
                // World border check
                if (px < GOBLET_SIZE || px > WORLD_WIDTH - GOBLET_SIZE ||
                    py < GOBLET_SIZE || py > WORLD_HEIGHT - GOBLET_SIZE) {
                    return true;
                }
                
                // Lake check (only if not thirsty)
                if (avoidLakes) {
                    if (isPointInLake(px, py, margin)) {
                        return true;
                    }
                }
            }
            return false;
        }

        // Find the best clear heading - IMPROVED to prefer directions toward target
        function clearHeading(goblet, angle, maxDist, targetAngle) {
            let sr = maxDist !== undefined ? maxDist : goblet.genes.sightRange;
            
            // First, try directions close to the original angle (or target angle if provided)
            let searchAngles = [];
            let baseAngle = targetAngle !== undefined ? targetAngle : angle;
            
            // Generate a list of angles to try, prioritizing those close to the base angle
            for (let i = 0; i <= 20; i++) {
                let spread = i * (Math.PI / 24);
                // Try positive and negative deviations
                if (i === 0) {
                    searchAngles.push(baseAngle);
                } else {
                    searchAngles.push(baseAngle + spread);
                    searchAngles.push(baseAngle - spread);
                    // Also try a bit further out for more variety
                    if (i > 5) {
                        searchAngles.push(baseAngle + spread * 1.5);
                        searchAngles.push(baseAngle - spread * 1.5);
                    }
                }
            }
            
            // Also add some random angles as fallback
            for (let i = 0; i < 8; i++) {
                searchAngles.push(Math.random() * Math.PI * 2);
            }
            
            // Try each angle
            for (let testAngle of searchAngles) {
                if (!headingBlocked(goblet, testAngle, sr)) {
                    return testAngle;
                }
            }
            
            // Ultimate fallback: aim toward center
            return Math.atan2(WORLD_HEIGHT / 2 - goblet.y, WORLD_WIDTH / 2 - goblet.x);
        }

        // Check if goblet is truly stuck (hasn't moved in a while)
        // ============================================================================
        // UPDATE LOOP
        // ============================================================================
        function update(deltaTime) {
            gameTime += deltaTime;

            for (let i = goblets.length - 1; i >= 0; i--) {
                let goblet = goblets[i];

                if (goblet.isActing) {
                    goblet.actionTimer -= deltaTime;
                    if (goblet.actionTimer <= 0) {
                        goblet.isActing = false;
                        goblet.isMating = false;
                        goblet.state = 'idle';
                        goblet.targetX = null;
                        goblet.targetY = null;
                    }
                    goblet.hunger -= HUNGER_DECAY_RATE * metabolism(goblet) * deltaTime * 0.1;
                    goblet.thirst -= THIRST_DECAY_RATE * deltaTime * 0.1;
                    if (goblet.hunger <= 0 || goblet.thirst <= 0) {
                        goblet.dead = true;
                        goblets.splice(i, 1);
                        continue;
                    }
                    continue;
                }

                let isResting = goblet.state === 'idle' && goblet.restUntil !== undefined && gameTime < goblet.restUntil;
                let restMult = isResting ? 0.1 : 1;
                goblet.hunger -= HUNGER_DECAY_RATE * metabolism(goblet) * deltaTime * restMult;
                goblet.thirst -= THIRST_DECAY_RATE * deltaTime * restMult;

                if (goblet.hunger <= 0 || goblet.thirst <= 0) {
                    goblet.dead = true;
                    goblets.splice(i, 1);
                    continue;
                }

                // Killed in a fight: HP dropped to zero.
                if (goblet.hp <= 0) {
                    goblet.dead = true;
                    goblets.splice(i, 1);
                    continue;
                }

                // Resolve illness: when the sick period ends, roll for death.
                // Death chance is 0.5 reduced by the goblet's immunity gene.
                // Survivors gain IMMUNITY_GAIN resistance (which their children
                // inherit); the dead are removed.
                if (goblet.sick && gameTime >= goblet.sickUntil) {
                    let deathChance = Math.max(0, BASE_DEATH_CHANCE - (goblet.genes.immunity || 0));
                    if (Math.random() < deathChance) {
                        goblet.dead = true;
                        goblets.splice(i, 1);
                        continue;
                    }
                    goblet.sick = false;
                    goblet.genes.immunity = clamp((goblet.genes.immunity || 0) + IMMUNITY_GAIN, 0, BASE_DEATH_CHANCE);
                }

                goblet.age += deltaTime;
                let af = agingFactor(goblet.age);
                goblet.genes.sightRange = goblet.baseSightRange * af;
                goblet.genes.speed = goblet.baseSpeed * af;

                if (goblet.reproCooldown > 0) goblet.reproCooldown -= deltaTime;

                // ---- COMBAT ----
                validateCombatTarget(goblet);
                // A panicking adult (starving/parched, sprinting) hunts a baby to eat.
                if (!goblet.combatTarget && goblet.isGrown && inPanic(goblet)) {
                    let prey = findBabyPrey(goblet);
                    if (prey) { goblet.combatTarget = prey; goblet.combatUntil = gameTime + AGGRO_DURATION; }
                }
                // Strike when in range and off cooldown — movement continues, so
                // goblets can run while fighting.
                if (goblet.combatTarget) {
                    let t = goblet.combatTarget;
                    if (Math.hypot(goblet.x - t.x, goblet.y - t.y) <= ATTACK_RANGE &&
                        gameTime >= (goblet.nextAttackTime || 0)) {
                        attack(goblet, t);
                    }
                }

                // Well-fed and hydrated (both above 85%): recover HP over time.
                let hpMax = maxHp(goblet);
                if (goblet.hp < hpMax && goblet.hunger > HEAL_THRESHOLD && goblet.thirst > HEAL_THRESHOLD) {
                    goblet.hp = Math.min(hpMax, goblet.hp + HEAL_RATE * deltaTime);
                }

                if (!goblet.isGrown) {
                    let range = goblet.genes.size - goblet.birthSize;
                    let rate = range / GROW_TIME_SECONDS;
                    goblet.currentSize += rate * deltaTime;
                    if (goblet.currentSize >= goblet.genes.size) {
                        goblet.currentSize = goblet.genes.size;
                        goblet.isGrown = true;
                    }
                }

                // Throttle the O(n) mate scan: at most ~once per sim-second,
                // staggered per goblet. Scanning every substep made this an
                // O(n^2)-per-step hot path that tanked FPS at high speed / large
                // populations. Mating takes 3s + a 10s cooldown, so a ~1s search
                // cadence is more than responsive enough.
                if (canReproduce(goblet) && goblet.state !== 'seekingMate' &&
                    (goblet.nextMateSearch === undefined || gameTime >= goblet.nextMateSearch)) {
                    goblet.nextMateSearch = gameTime + 0.75 + Math.random() * 0.5;
                    let mate = findMate(goblet);
                    if (mate) {
                        goblet.state = 'seekingMate';
                        goblet.mateTarget = mate;
                        mate.state = 'seekingMate';
                        mate.mateTarget = goblet;
                    }
                }

                if (goblet.state === 'seekingMate') {
                    let mt = goblet.mateTarget;
                    if (!mt || !goblets.includes(mt) || !canReproduce(goblet) || !canReproduce(mt)) {
                        goblet.state = 'idle';
                        goblet.mateTarget = null;
                        goblet.targetX = null;
                        goblet.targetY = null;
                    } else {
                        let dist = Math.hypot(goblet.x - mt.x, goblet.y - mt.y);
                        if (dist < GOBLET_SIZE * 1.5) {
                            reproduce(goblet, mt);
                            continue;
                        }
                    }
                }

                let needWater = goblet.thirst < THIRST_THRESHOLD;
                let needFood  = goblet.hunger < HUNGER_THRESHOLD;

                // Stay committed to the current errand until that need is met,
                // so a goblet that needs BOTH doesn't flip-flop between food and
                // water every frame and get stuck between them.
                let busyWater = goblet.state === 'seekingWater' && needWater;
                let busyFood  = goblet.state === 'seekingFood'  && needFood;

                if (!busyWater && !busyFood) {
                    if (needWater || needFood) {
                        // Go for the MORE urgent need first (lower stat wins);
                        // if both are equally low, pick one at random.
                        let goWater;
                        if (needWater && needFood) {
                            if (goblet.thirst < goblet.hunger)      goWater = true;
                            else if (goblet.hunger < goblet.thirst) goWater = false;
                            else                                    goWater = Math.random() < 0.5;
                        } else {
                            goWater = needWater;
                        }
                        let desired = goWater ? 'seekingWater' : 'seekingFood';
                        if (goblet.state !== desired) {
                            goblet.state = desired;
                            goblet.targetX = null;
                            goblet.targetY = null;
                            goblet.commitX = null;
                            goblet.commitY = null;
                            goblet.mateTarget = null;
                        }
                    } else if (goblet.state !== 'seekingMate') {
                        goblet.state = 'idle';
                        goblet.targetX = null;
                        goblet.targetY = null;
                    }
                }

                updateGobletBehavior(goblet, deltaTime);
                moveGoblet(goblet, deltaTime);
                checkLakeInteraction(goblet);
                checkBushInteraction(goblet);
            }

            for (let bush of bushes) {
                if (gameTime - bush.lastRegrow > APPLE_REGROW_SECONDS && bush.apples < MAX_APPLES_PER_BUSH) {
                    bush.apples++;
                    bush.lastRegrow = gameTime;
                }
            }

            // Bushes die of old age after 2500s, regardless of berries left.
            for (let i = bushes.length - 1; i >= 0; i--) {
                if (gameTime - (bushes[i].bornAt || 0) >= 3500) {
                    bushes.splice(i, 1);
                }
            }

            for (let i = pendingPoops.length - 1; i >= 0; i--) {
                let pp = pendingPoops[i];
                if (gameTime >= pp.dropTime) {
                    let g = pp.goblet;
                    let px, py;
                    if (goblets.includes(g)) {
                        let poopAngle = Math.random() * Math.PI * 2;
                        px = g.x + Math.cos(poopAngle) * GOBLET_SIZE;
                        py = g.y + Math.sin(poopAngle) * GOBLET_SIZE;
                    } else {
                        px = Math.random() * (WORLD_WIDTH - 40) + 20;
                        py = Math.random() * (WORLD_HEIGHT - 40) + 20;
                    }
                    px = Math.max(20, Math.min(WORLD_WIDTH - 20, px));
                    py = Math.max(20, Math.min(WORLD_HEIGHT - 20, py));
                    let willSprout = Math.random() < POOP_SPROUT_CHANCE;
                    // Block sprouting if another bush (grown or growing) is too close.
                    if (willSprout && !bushSpotClear(px, py)) willSprout = false;
                    growingBushes.push({ x: px, y: py, stage: 0, stageTime: gameTime, willSprout: willSprout, infectious: pp.infectious });
                    pendingPoops.splice(i, 1);
                }
            }

            for (let i = growingBushes.length - 1; i >= 0; i--) {
                let gb = growingBushes[i];
                if (gameTime - gb.stageTime >= BUSH_STAGE_DURATION) {
                    if (gb.stage === 0 && !gb.willSprout) {
                        // A poop that never becomes a bush withers into grass.
                        grasses.push({ x: gb.x, y: gb.y });
                        growingBushes.splice(i, 1);
                        continue;
                    }
                    gb.stage++;
                    gb.stageTime = gameTime;
                    if (gb.stage >= BUSH_STAGES.length - 1) {
                        bushes.push({ x: gb.x, y: gb.y, radius: 30, apples: 0, lastRegrow: gameTime, picked: 0, bornAt: gameTime, toxic: Math.random() < TOXIC_BUSH_CHANCE, toxicPicked: 0 });
                        growingBushes.splice(i, 1);
                    }
                }
            }

            // Infectious poop: droppings from sick goblets infect any healthy
            // goblet that wanders within POOP_INFECT_RADIUS while it's still poop.
            for (let gb of growingBushes) {
                if (!gb.infectious || gb.stage !== 0) continue;
                for (let g of goblets) {
                    if (g.sick) continue;
                    if (Math.hypot(g.x - gb.x, g.y - gb.y) < POOP_INFECT_RADIUS) infect(g);
                }
            }
        }

        function updateGobletBehavior(goblet, deltaTime) {
            if (goblet.isActing) return;

            // Combat takes over movement: close in on the foe, then plant and
            // fight — once within attack range neither side can move.
            if (goblet.combatTarget) {
                let t = goblet.combatTarget;
                goblet.commitX = null;
                goblet.commitY = null;
                if (Math.hypot(goblet.x - t.x, goblet.y - t.y) <= ATTACK_RANGE) {
                    goblet.targetX = null;
                    goblet.targetY = null;
                    goblet.vx = 0;
                    goblet.vy = 0;
                } else {
                    goblet.targetX = t.x;
                    goblet.targetY = t.y;
                }
                return;
            }

            if (goblet.state === 'seekingWater') {
                seekResource(goblet, deltaTime, 'water');
            } else if (goblet.state === 'seekingFood') {
                seekResource(goblet, deltaTime, 'food');
            } else if (goblet.state === 'seekingMate' && goblet.mateTarget) {
                goblet.targetX = goblet.mateTarget.x;
                goblet.targetY = goblet.mateTarget.y;
                goblet.commitX = null;
                goblet.commitY = null;
            } else {
                goblet.commitX = null;
                goblet.commitY = null;
                if (followFather(goblet, deltaTime)) return;
                goblet.targetX = null;
                goblet.targetY = null;
                wander(goblet, deltaTime);
            }
        }

        // An un-grown child keeps its father within viewing range: if dad drifts
        // toward the edge of the child's sight, the child moves to close the gap.
        // Returns true if the child is shepherding after its father.
        function followFather(goblet, deltaTime) {
            if (goblet.isGrown || goblet.fatherId == null) return false;
            let father = null;
            for (let g of goblets) { if (g.id === goblet.fatherId) { father = g; break; } }
            if (!father) return false;   // father died: child is on its own

            let dist = Math.hypot(goblet.x - father.x, goblet.y - father.y);
            let leash = goblet.genes.sightRange * 0.7;   // stay comfortably in sight
            if (dist > leash) {
                goblet.targetX = father.x;
                goblet.targetY = father.y;
                goblet.restUntil = undefined;
            } else {
                goblet.targetX = null;
                goblet.targetY = null;
                wander(goblet, deltaTime);
            }
            return true;
        }

        function seekResource(goblet, deltaTime, kind) {
            // Detection is based on distance to the resource's SURFACE (edge),
            // not its center — otherwise a goblet standing at the water's edge,
            // with the lake filling its sight circle, wouldn't register it as
            // water because the lake's center is beyond its sight range.
            let sr = goblet.genes.sightRange;
            let best = null, bestEdge = sr, bestCenter = 0;
            if (kind === 'water') {
                for (let lake of lakes) {
                    let d = Math.hypot(goblet.x - lake.x, goblet.y - lake.y);
                    let edge = d - lake.radius;
                    if (edge < bestEdge) { bestEdge = edge; bestCenter = d; best = lake; }
                }
            } else {
                for (let bush of bushes) {
                    if (bush.apples <= 0) continue;
                    let d = Math.hypot(goblet.x - bush.x, goblet.y - bush.y);
                    let edge = d - bush.radius;
                    if (edge < bestEdge) { bestEdge = edge; bestCenter = d; best = bush; }
                }
            }

            if (best) {
                goblet.commitX = best.x;
                goblet.commitY = best.y;
                goblet.commitBestDist = bestCenter;
                goblet.commitProgressTime = gameTime;
            } else if (goblet.commitX != null) {
                let dc = Math.hypot(goblet.x - goblet.commitX, goblet.y - goblet.commitY);
                if (goblet.commitBestDist === undefined || dc < goblet.commitBestDist - 1) {
                    goblet.commitBestDist = dc;
                    goblet.commitProgressTime = gameTime;
                }
                let arrived = dc < BUSH_SIZE / 2 + GOBLET_SIZE;
                let stalled = gameTime - (goblet.commitProgressTime || gameTime) > 10;
                if (arrived || stalled) {
                    goblet.commitX = null;
                    goblet.commitY = null;
                    goblet.commitBestDist = undefined;
                }
            }

            if (goblet.commitX != null) {
                goblet.targetX = goblet.commitX;
                goblet.targetY = goblet.commitY;
            } else {
                goblet.targetX = null;
                goblet.targetY = null;
                wander(goblet, deltaTime);
            }
        }

        function wander(goblet, deltaTime) {
            let isUrgent = goblet.state === 'seekingFood' || goblet.state === 'seekingWater' ||
                           goblet.hunger < 50 || goblet.thirst < 50 ||
                           canReproduce(goblet);

            if (isUrgent) {
                goblet.restUntil = undefined;
            }

            if (!isUrgent && goblet.restUntil !== undefined && gameTime < goblet.restUntil) {
                goblet.vx = 0;
                goblet.vy = 0;
                return;
            }

            if (gameTime - goblet.lastWanderChange > 2) {
                if (!isUrgent && (goblet.restUntil === undefined || gameTime >= goblet.restUntil)) {
                    goblet.restUntil = gameTime + Math.random() * 5;
                    goblet.vx = 0;
                    goblet.vy = 0;
                    goblet.lastWanderChange = gameTime;
                    return;
                }

                goblet.wanderAngle += (Math.random() - 0.5) * Math.PI;
                goblet.lastWanderChange = gameTime;
                goblet.restUntil = undefined;
            }

            // Steer away from blocked headings: the world border always, and
            // lakes too unless this goblet is heading in to drink.
            if (headingBlocked(goblet, goblet.wanderAngle)) {
                goblet.wanderAngle = clearHeading(goblet, goblet.wanderAngle);
                goblet.restUntil = undefined;
            }

            goblet.vx = Math.cos(goblet.wanderAngle) * WANDER_FORCE;
            goblet.vy = Math.sin(goblet.wanderAngle) * WANDER_FORCE;
        }

        function moveGoblet(goblet, deltaTime) {
            if (goblet.isActing) {
                goblet.vx = 0;
                goblet.vy = 0;
                return;
            }

            let speed = goblet.genes.speed;
            // Desperation boost: at the last 10% of hunger or thirst, a goblet
            // sprints (1.75x) until it replenishes (stat rises above 10) or dies.
            if (goblet.hunger <= 10 || goblet.thirst <= 10) {
                speed *= 1.75;
            }
            // Sickness slows a goblet down (0.25 speed debuff).
            if (goblet.sick) {
                speed *= SICK_SPEED_MULT;
            }
            let avoidLakes = !goingToDrink(goblet);

            let heading;
            let targetAngle = null;

            if (goblet.targetX !== null && goblet.targetY !== null) {
                let dx = goblet.targetX - goblet.x, dy = goblet.targetY - goblet.y;
                let distToTarget = Math.hypot(dx, dy) || 1;
                heading = Math.atan2(dy, dx);
                targetAngle = heading;

                // Always route around the border; around lakes unless drinking.
                let look = Math.max(30, Math.min(distToTarget, goblet.genes.sightRange));
                if (headingBlocked(goblet, heading, look)) {
                    heading = clearHeading(goblet, heading, look, targetAngle);
                }
            } else {
                if (Math.abs(goblet.vx) + Math.abs(goblet.vy) < 1e-6) {
                    goblet.vx = 0; goblet.vy = 0;
                    return;
                }
                heading = Math.atan2(goblet.vy, goblet.vx);

                // Check if wander heading is blocked (border always; lakes unless drinking)
                if (headingBlocked(goblet, heading)) {
                    heading = clearHeading(goblet, heading, undefined, null);
                    goblet.wanderAngle = heading;
                }
            }

            goblet.vx = Math.cos(heading) * speed;
            goblet.vy = Math.sin(heading) * speed;

            let newX = goblet.x + goblet.vx * deltaTime;
            let newY = goblet.y + goblet.vy * deltaTime;

            if (avoidLakes) {
                for (let lake of lakes) {
                    let dx = newX - lake.x;
                    let dy = newY - lake.y;
                    let d = Math.hypot(dx, dy) || 1;
                    let minDist = lake.radius + GOBLET_SIZE / 2 + 2;
                    if (d < minDist) {
                        newX = lake.x + (dx / d) * minDist;
                        newY = lake.y + (dy / d) * minDist;
                        let pushAngle = Math.atan2(dy, dx);
                        goblet.vx = Math.cos(pushAngle) * speed * 0.3;
                        goblet.vy = Math.sin(pushAngle) * speed * 0.3;
                        goblet.commitX = null;
                        goblet.commitY = null;
                        goblet.commitBestDist = undefined;
                        goblet.targetX = null;
                        goblet.targetY = null;
                    }
                }
            }

            newX = clamp(newX, GOBLET_SIZE / 2, WORLD_WIDTH - GOBLET_SIZE / 2);
            newY = clamp(newY, GOBLET_SIZE / 2, WORLD_HEIGHT - GOBLET_SIZE / 2);

            goblet.x = newX;
            goblet.y = newY;
        }

        function checkLakeInteraction(goblet) {
            if (goblet.isActing) return;
            if (goblet.state !== 'seekingWater') return;

            for (let lake of lakes) {
                let dist = Math.hypot(goblet.x - lake.x, goblet.y - lake.y);
                if (dist < lake.radius + GOBLET_SIZE / 2) {
                    goblet.thirst = 100;
                    goblet.isActing = true;
                    goblet.actionTimer = DRINK_DURATION;
                    goblet.state = 'idle';
                    goblet.targetX = null;
                    goblet.targetY = null;
                    goblet.commitX = null;
                    goblet.commitY = null;
                    return;
                }
            }
        }

        function checkBushInteraction(goblet) {
            if (goblet.isActing) return;
            if (goblet.state !== 'seekingFood') return;

            for (let bush of bushes) {
                let dist = Math.hypot(goblet.x - bush.x, goblet.y - bush.y);
                if (dist < BUSH_SIZE / 2 + GOBLET_SIZE / 2 && bush.apples > 0) {
                    bush.apples--;
                    bush.picked = (bush.picked || 0) + 1;
                    goblet.hunger = 100;
                    goblet.berriesEaten++;
                    if (goblet.berriesEaten >= 3) {
                        goblet.berriesEaten = 0;
                        pendingPoops.push({ goblet: goblet, dropTime: gameTime + POOP_DELAY, infectious: goblet.sick });
                    }

                    if (!goblet.isGrown) {
                        let range = goblet.genes.size - goblet.birthSize;
                        let bonus = (range / GROW_TIME_SECONDS) * EAT_GROWTH_BONUS;
                        goblet.currentSize = Math.min(goblet.currentSize + bonus, goblet.genes.size);
                        if (goblet.currentSize >= goblet.genes.size) {
                            goblet.isGrown = true;
                        }
                    }

                    goblet.isActing = true;
                    goblet.actionTimer = EAT_DURATION;
                    goblet.state = 'idle';
                    goblet.targetX = null;
                    goblet.targetY = null;
                    goblet.commitX = null;
                    goblet.commitY = null;
                    bush.lastRegrow = gameTime;

                    if (bush.toxic) {
                        // Toxic berries infect the eater, and the bush is spent
                        // after TOXIC_BUSH_MAX_PICKS berries are taken.
                        infect(goblet);
                        bush.toxicPicked = (bush.toxicPicked || 0) + 1;
                        if (bush.toxicPicked >= TOXIC_BUSH_MAX_PICKS) {
                            let bi = bushes.indexOf(bush);
                            if (bi !== -1) bushes.splice(bi, 1);
                        }
                    } else if (bush.picked >= 20) {
                        // a normal bush is exhausted after its berries are picked 20 times
                        let bi = bushes.indexOf(bush);
                        if (bi !== -1) bushes.splice(bi, 1);
                    }
                    return;
                }
            }
        }

        // ============================================================================
        // RENDERING
        // ============================================================================
        function render() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.setTransform(camera.zoom, 0, 0, camera.zoom, camera.x, camera.y);

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

            // Draw lakes
            ctx.fillStyle = '#2563eb';
            for (let lake of lakes) {
                ctx.beginPath();
                ctx.arc(lake.x, lake.y, lake.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw grass (from poops that never became bushes), under everything else
            if (assets.grass) {
                for (let g of grasses) {
                    ctx.drawImage(assets.grass, g.x - GRASS_SIZE / 2, g.y - GRASS_SIZE / 2, GRASS_SIZE, GRASS_SIZE);
                }
            }

            // Draw bushes with berries
            for (let bush of bushes) {
                ctx.save();
                if (assets.bush) {
                    ctx.drawImage(assets.bush, bush.x - BUSH_SIZE / 2, bush.y - BUSH_SIZE / 2, BUSH_SIZE, BUSH_SIZE);
                }
                ctx.restore();

                let berryImg = bush.toxic ? assets.toxicberry : assets.berry;
                for (let i = 0; i < bush.apples; i++) {
                    let pos = BERRY_POSITIONS[i];
                    let berryX = bush.x + pos.dx * BUSH_SIZE;
                    let berryY = bush.y + pos.dy * BUSH_SIZE;
                    ctx.save();
                    if (berryImg) {
                        ctx.drawImage(berryImg, berryX - BERRY_SIZE / 2, berryY - BERRY_SIZE / 2, BERRY_SIZE, BERRY_SIZE);
                    }
                    ctx.restore();
                }
            }

            // Draw growing bushes / poop
            for (let gb of growingBushes) {
                let stageName = BUSH_STAGES[gb.stage];
                let img = assets[stageName];
                let sz = GROWING_BUSH_SIZES[stageName] || 30;
                if (img) {
                    ctx.drawImage(img, gb.x - sz / 2, gb.y - sz / 2, sz, sz);
                }
            }

            let descendantIds = null;
            if (selectedGobletId !== null) {
                descendantIds = new Set();
                let frontier = [selectedGobletId];
                while (frontier.length) {
                    let pid = frontier.pop();
                    for (let g of goblets) {
                        if (!descendantIds.has(g.id) && g.parents && g.parents.includes(pid)) {
                            descendantIds.add(g.id);
                            frontier.push(g.id);
                        }
                    }
                }
            }

            for (let goblet of goblets) {
                let skin = getTintedSkin(goblet.genes.color);
                let size = Math.max(10, goblet.currentSize);

                if (descendantIds && descendantIds.has(goblet.id)) {
                    ctx.beginPath();
                    ctx.arc(goblet.x, goblet.y, size / 2 + 4, 0, Math.PI * 2);
                    ctx.lineWidth = 2.5;
                    ctx.strokeStyle = '#22c55e';
                    ctx.stroke();
                }

                if (goblet.id === selectedGobletId) {
                    ctx.beginPath();
                    ctx.arc(goblet.x, goblet.y, goblet.genes.sightRange, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 220, 100, 0.10)';
                    ctx.fill();
                    ctx.lineWidth = 1.5;
                    ctx.strokeStyle = 'rgba(255, 220, 100, 0.6)';
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(goblet.x, goblet.y, size / 2 + 4, 0, Math.PI * 2);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#fbbf24';
                    ctx.stroke();

                    // If this goblet is fighting, ring its foe in red.
                    let foe = goblet.combatTarget;
                    if (foe && !foe.dead && foe.hp > 0 && goblets.includes(foe)) {
                        let foeSize = Math.max(10, foe.currentSize);
                        ctx.beginPath();
                        ctx.arc(foe.x, foe.y, foeSize / 2 + 6, 0, Math.PI * 2);
                        ctx.lineWidth = 2.5;
                        ctx.strokeStyle = '#ef4444';
                        ctx.stroke();
                    }

                    // Pathfinding visualization
                    let sr = goblet.genes.sightRange;

                    // 360° blocked-ray sweep
                    let nRays = 24;
                    for (let ri = 0; ri < nRays; ri++) {
                        let a = (ri / nRays) * Math.PI * 2;
                        let blocked = headingBlocked(goblet, a, sr);
                        if (blocked) {
                            let rx = goblet.x + Math.cos(a) * sr;
                            let ry = goblet.y + Math.sin(a) * sr;
                            ctx.beginPath();
                            ctx.moveTo(goblet.x, goblet.y);
                            ctx.lineTo(rx, ry);
                            ctx.lineWidth = 1;
                            ctx.strokeStyle = 'rgba(239, 68, 68, 0.25)';
                            ctx.stroke();
                        }
                    }

                    // Line to committed target
                    if (goblet.commitX != null) {
                        ctx.beginPath();
                        ctx.moveTo(goblet.x, goblet.y);
                        ctx.lineTo(goblet.commitX, goblet.commitY);
                        ctx.setLineDash([4, 4]);
                        ctx.lineWidth = 1.5;
                        ctx.strokeStyle = 'rgba(251, 191, 36, 0.7)';
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.beginPath();
                        ctx.arc(goblet.commitX, goblet.commitY, 5, 0, Math.PI * 2);
                        ctx.lineWidth = 1.5;
                        ctx.strokeStyle = '#fbbf24';
                        ctx.stroke();
                    }

                    // Current movement heading arrow
                    let spd = Math.abs(goblet.vx) + Math.abs(goblet.vy);
                    if (spd > 0.1) {
                        let heading = Math.atan2(goblet.vy, goblet.vx);
                        let hLen = Math.min(sr * 0.5, 50);
                        let hx = goblet.x + Math.cos(heading) * hLen;
                        let hy = goblet.y + Math.sin(heading) * hLen;
                        ctx.beginPath();
                        ctx.moveTo(goblet.x, goblet.y);
                        ctx.lineTo(hx, hy);
                        ctx.lineWidth = 2.5;
                        ctx.strokeStyle = '#22c55e';
                        ctx.stroke();
                        let aSize = 7;
                        ctx.beginPath();
                        ctx.moveTo(hx, hy);
                        ctx.lineTo(hx - Math.cos(heading - 0.5) * aSize, hy - Math.sin(heading - 0.5) * aSize);
                        ctx.moveTo(hx, hy);
                        ctx.lineTo(hx - Math.cos(heading + 0.5) * aSize, hy - Math.sin(heading + 0.5) * aSize);
                        ctx.lineWidth = 2.5;
                        ctx.stroke();
                    }
                }

                let moving = !goblet.isActing && (Math.abs(goblet.vx) + Math.abs(goblet.vy)) > 1;
                let bob = 0;
                if (moving) {
                    let freq = 8 + goblet.genes.speed * 0.15;
                    bob = Math.abs(Math.sin(gameTime * freq + goblet.bobPhase)) * (size * 0.15);
                }

                let dx = goblet.x - size / 2;
                let dy = goblet.y - size / 2 - bob;

                if (skin) {
                    ctx.drawImage(skin, dx, dy, size, size);
                }
                let outline = (goblet.gender === 'female' && assets.femaleOutline)
                    ? assets.femaleOutline : assets.humanOutline;
                if (outline) {
                    ctx.drawImage(outline, dx, dy, size, size);
                }

                // Just got hit: flash white for a second so fights are visible.
                if (goblet.hitFlashUntil && gameTime < goblet.hitFlashUntil) {
                    let flash = getTintedSkin({ r: 255, g: 255, b: 255 });
                    if (flash) {
                        ctx.save();
                        ctx.globalAlpha = 0.85;
                        ctx.drawImage(flash, dx, dy, size, size);
                        ctx.restore();
                    }
                }

                if (!goblet.isGrown) {
                    let progress = clamp(goblet.currentSize / goblet.genes.size, 0, 1);
                    let barWidth = 20;
                    let barHeight = 2;
                    let barX = goblet.x - barWidth / 2;
                    let barY = goblet.y - size / 2 - 16;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(barX, barY, barWidth, barHeight);
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(barX, barY, progress * barWidth, barHeight);
                }

                let barWidth = 20;
                let barHeight = 2;
                let barX = goblet.x - barWidth / 2;
                let barY = goblet.y - size / 2 - 12;

                ctx.fillStyle = '#444';
                ctx.fillRect(barX, barY, barWidth, barHeight);
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(barX, barY, (goblet.hunger / 100) * barWidth, barHeight);

                ctx.fillStyle = '#444';
                ctx.fillRect(barX, barY + 3, barWidth, barHeight);
                ctx.fillStyle = '#2563eb';
                ctx.fillRect(barX, barY + 3, (goblet.thirst / 100) * barWidth, barHeight);

                // HP bar (green); the bar's max scales with body size.
                ctx.fillStyle = '#444';
                ctx.fillRect(barX, barY + 6, barWidth, barHeight);
                ctx.fillStyle = '#22c55e';
