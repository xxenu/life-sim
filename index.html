                ctx.fillRect(barX, barY + 6, clamp(goblet.hp / maxHp(goblet), 0, 1) * barWidth, barHeight);

                if (goblet.isActing && goblet.isMating && assets.hearts) {
                    let hSize = 20;
                    ctx.drawImage(assets.hearts, goblet.x - hSize / 2, goblet.y - size / 2 - hSize - 4, hSize, hSize);
                }

                // Sick goblets wear the disease texture over their skin: same
                // position and size as the body sprite, so it scales with the
                // goblet and bobs up and down with it.
                if (goblet.sick && assets.disease) {
                    ctx.drawImage(assets.disease, dx, dy, size, size);
                }
            }

            document.getElementById('population').textContent = goblets.length;
            document.getElementById('time').textContent = gameTime.toFixed(1) + 's';
        }

        // ============================================================================
        // CAMERA CONTROLS
        // ============================================================================
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            let my = (e.clientY - rect.top) * (canvas.height / rect.height);
            let worldX = (mx - camera.x) / camera.zoom;
            let worldY = (my - camera.y) / camera.zoom;
            let zoomFactor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
            camera.zoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.zoom * zoomFactor));
            camera.x = mx - worldX * camera.zoom;
            camera.y = my - worldY * camera.zoom;
        }, { passive: false });

        let mouseDownPos = { x: 0, y: 0 };
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStart.x = e.clientX;
            dragStart.y = e.clientY;
            mouseDownPos.x = e.clientX;
            mouseDownPos.y = e.clientY;
            canvas.style.cursor = 'grabbing';
        });

        function selectGobletAt(clientX, clientY) {
            let rect = canvas.getBoundingClientRect();
            let mx = (clientX - rect.left) * (canvas.width / rect.width);
            let my = (clientY - rect.top) * (canvas.height / rect.height);
            let worldX = (mx - camera.x) / camera.zoom;
            let worldY = (my - camera.y) / camera.zoom;

            let best = null, bestDist = Infinity;
            for (let g of goblets) {
                let d = Math.hypot(worldX - g.x, worldY - g.y);
                let hitR = Math.max(10, g.currentSize) / 2 + 6;
                if (d < hitR && d < bestDist) {
                    bestDist = d;
                    best = g;
                }
            }
            selectedGobletId = best ? best.id : null;
            updateInspector();
        }

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            camera.x += (e.clientX - dragStart.x) * scaleX;
            camera.y += (e.clientY - dragStart.y) * scaleY;
            dragStart.x = e.clientX;
            dragStart.y = e.clientY;
        });

        window.addEventListener('mouseup', (e) => {
            isDragging = false;
            canvas.style.cursor = 'grab';
            let moved = Math.hypot(e.clientX - mouseDownPos.x, e.clientY - mouseDownPos.y);
            if (moved < 5 && e.target === canvas) {
                selectGobletAt(e.clientX, e.clientY);
            }
        });

        function updateInspector() {
            let panel = document.getElementById('inspector');
            if (selectedGobletId === null) { panel.style.display = 'none'; return; }
            let g = goblets.find(x => x.id === selectedGobletId);
            if (!g) {
                panel.style.display = 'none';
                selectedGobletId = null;
                return;
            }
            panel.style.display = 'block';
            let c = g.genes.color;
            document.getElementById('insSwatch').style.background = colorToCss(c);
            document.getElementById('insId').textContent = '#' + g.id;
            document.getElementById('insName').textContent = g.name || '—';
            document.getElementById('insGen').textContent = g.generation;
            document.getElementById('insGender').textContent =
                g.gender === 'female' ? '♀ female' : '♂ male';
            document.getElementById('insAge').textContent =
                g.age.toFixed(0) + 's' + (g.age >= REPRO_MAX_AGE ? ' (infertile)' : '');
            let baseStatus = g.isMating ? 'mating' : g.isActing ? 'busy' : (g.state === 'seekingWater' ? 'thirsty' :
                g.state === 'seekingFood' ? 'hungry' : g.state === 'seekingMate' ? 'seeking mate' : 'idle');
            document.getElementById('insStatus').textContent =
                g.sick ? `🤢 sick (${Math.max(0, g.sickUntil - gameTime).toFixed(0)}s) · ${baseStatus}` : baseStatus;
            document.getElementById('insHunger').textContent = g.hunger.toFixed(0) + '%';
            document.getElementById('insThirst').textContent = g.thirst.toFixed(0) + '%';
            document.getElementById('insColor').textContent = `${c.r|0}, ${c.g|0}, ${c.b|0}`;
            document.getElementById('insSight').textContent = g.genes.sightRange.toFixed(1);
            document.getElementById('insSpeed').textContent = g.genes.speed.toFixed(1);
            document.getElementById('insSize').textContent = g.genes.size.toFixed(1);
            document.getElementById('insCurSize').textContent = g.currentSize.toFixed(1) +
                (g.isGrown ? '' : ' (growing)');
            document.getElementById('insScore').textContent = geneQuality(g).toFixed(2);
            let imm = g.genes.immunity || 0;
            document.getElementById('insImmunity').textContent =
                `${(imm * 100).toFixed(0)}% (death ${Math.max(0, BASE_DEATH_CHANCE - imm) * 100 | 0}%)`;
        }

        document.getElementById('inspectorClose').addEventListener('click', () => {
            selectedGobletId = null;
            document.getElementById('inspector').style.display = 'none';
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                paused = !paused;
                document.getElementById('pausedTag').style.display = paused ? 'block' : 'none';
            }
        });

        canvas.style.cursor = 'grab';

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function centerCamera() {
            camera.x = (canvas.width - WORLD_WIDTH * camera.zoom) / 2;
            camera.y = (canvas.height - WORLD_HEIGHT * camera.zoom) / 2;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        centerCamera();

        // ============================================================================
        // SIMULATION SPEED CONTROLS
        // ============================================================================
        let simSpeed = 1;
        const SPEED_MIN = 1;
        const SPEED_MAX = 1000;
        const FIXED_DT = 1 / 60;
        const MAX_STEPS_PER_FRAME = 120;

        function buildSpeedControls() {
            let container = document.getElementById('controls');
            container.innerHTML = '';

            let label = document.createElement('span');
            label.className = 'speed-caption';
            label.textContent = 'Speed';

            let slider = document.createElement('input');
            slider.type = 'range';
            slider.min = SPEED_MIN;
            slider.max = SPEED_MAX;
            slider.step = 1;
            slider.value = simSpeed;
            slider.id = 'speedSlider';
            slider.addEventListener('input', () => setSimSpeed(Number(slider.value)));

            let readout = document.createElement('span');
            readout.className = 'speed-readout';
            readout.id = 'speedReadout';
            readout.textContent = simSpeed + 'x';

            container.appendChild(label);
            container.appendChild(slider);
            container.appendChild(readout);
        }

        function setSimSpeed(s) {
            simSpeed = Math.max(SPEED_MIN, Math.min(SPEED_MAX, Math.round(s)));
            document.getElementById('speedLabel').textContent = simSpeed + 'x';
            let readout = document.getElementById('speedReadout');
            if (readout) readout.textContent = simSpeed + 'x';
            let slider = document.getElementById('speedSlider');
            if (slider && Number(slider.value) !== simSpeed) slider.value = simSpeed;
        }

        // ============================================================================
        // MAIN LOOP
        // ============================================================================
        let lastTime = performance.now();

        // ============================================================================
        // FAMILY-NAME POPULATION GRAPH
        // ============================================================================
        let graphVisible = false;
        let graphHistory = [];              // [{ t, counts:{name:n} }]
        let lastGraphSample = -Infinity;
        const GRAPH_SAMPLE_INTERVAL = 8;    // sim-seconds between samples
        const GRAPH_MAX_POINTS = 400;

        // Deterministic, evenly-spread colour for a surname.
        const nameColorCache = {};
        // Each surname maps to its founder colour so graph lines match the
        // goblets they represent.
        const NAME_GRAPH_COLORS = {
            Redson:   colorToCss(SPAWN_COLORS[0]),
            Greenson: colorToCss(SPAWN_COLORS[1]),
            Blueson:  colorToCss(SPAWN_COLORS[2])
        };
        function nameColor(name) {
            if (NAME_GRAPH_COLORS[name]) return NAME_GRAPH_COLORS[name];
            if (nameColorCache[name]) return nameColorCache[name];
            let h = 0;
            for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
            let hue = ((h % 360) + 360) % 360;
            let c = `hsl(${hue}, 70%, 55%)`;
            nameColorCache[name] = c;
            return c;
        }

        function sampleGraph() {
            if (gameTime - lastGraphSample < GRAPH_SAMPLE_INTERVAL) return;
            lastGraphSample = gameTime;
            let counts = {};
            let infected = 0;
            for (let g of goblets) {
                let n = g.name || '(none)';
                counts[n] = (counts[n] || 0) + 1;
                if (g.sick) infected++;
            }
            graphHistory.push({ t: gameTime, counts, infected });
            if (graphHistory.length > GRAPH_MAX_POINTS) graphHistory.shift();
        }

        function drawGraph() {
            let cv = document.getElementById('graphCanvas');
            let gx = cv.getContext('2d');
            let W = cv.width, H = cv.height;
            gx.clearRect(0, 0, W, H);
            gx.fillStyle = '#141414';
            gx.fillRect(0, 0, W, H);

            const padL = 28, padR = 8, padT = 8, padB = 16;
            const plotW = W - padL - padR, plotH = H - padT - padB;

            if (graphHistory.length < 2) {
                gx.fillStyle = '#666';
                gx.font = '12px Arial';
                gx.fillText('Collecting data…', padL, padT + plotH / 2);
                return;
            }

            let names = new Set();
            let maxCount = 1;
            for (let pt of graphHistory) {
                for (let n in pt.counts) {
                    names.add(n);
                    if (pt.counts[n] > maxCount) maxCount = pt.counts[n];
                }
            }
            let t0 = graphHistory[0].t;
            let t1 = graphHistory[graphHistory.length - 1].t;
            let tRange = Math.max(1, t1 - t0);

            // axes
            gx.strokeStyle = '#333';
            gx.lineWidth = 1;
            gx.beginPath();
            gx.moveTo(padL, padT);
            gx.lineTo(padL, padT + plotH);
            gx.lineTo(padL + plotW, padT + plotH);
            gx.stroke();
            gx.fillStyle = '#888';
            gx.font = '10px Arial';
            gx.textAlign = 'right';
            gx.fillText(String(maxCount), padL - 4, padT + 8);
            gx.fillText('0', padL - 4, padT + plotH);
            gx.textAlign = 'left';

            let X = t => padL + ((t - t0) / tRange) * plotW;
            let Y = c => padT + plotH - (c / maxCount) * plotH;

            for (let name of names) {
                gx.strokeStyle = nameColor(name);
                gx.lineWidth = 1.5;
                gx.beginPath();
                let started = false;
                for (let pt of graphHistory) {
                    let c = pt.counts[name] || 0;
                    let px = X(pt.t), py = Y(c);
                    if (!started) { gx.moveTo(px, py); started = true; }
                    else gx.lineTo(px, py);
                }
                gx.stroke();
            }
        }

        // Single-line graph of the total number of infected goblets over time.
        function drawInfectedGraph() {
            let cv = document.getElementById('infectedCanvas');
            let gx = cv.getContext('2d');
            let W = cv.width, H = cv.height;
            gx.clearRect(0, 0, W, H);
            gx.fillStyle = '#141414';
            gx.fillRect(0, 0, W, H);

            const padL = 28, padR = 8, padT = 8, padB = 16;
            const plotW = W - padL - padR, plotH = H - padT - padB;

            // Live total of currently-infected goblets, shown below the graph.
            let liveInfected = 0;
            for (let g of goblets) if (g.sick) liveInfected++;
            document.getElementById('infectedReadout').textContent =
                'Currently infected: ' + liveInfected;

            if (graphHistory.length < 2) {
                gx.fillStyle = '#666';
                gx.font = '12px Arial';
                gx.fillText('Collecting data…', padL, padT + plotH / 2);
                return;
            }

            let maxInf = 1;
            for (let pt of graphHistory) {
                let inf = pt.infected || 0;
                if (inf > maxInf) maxInf = inf;
            }
            let t0 = graphHistory[0].t;
            let t1 = graphHistory[graphHistory.length - 1].t;
            let tRange = Math.max(1, t1 - t0);

            gx.strokeStyle = '#333';
            gx.lineWidth = 1;
            gx.beginPath();
            gx.moveTo(padL, padT);
            gx.lineTo(padL, padT + plotH);
            gx.lineTo(padL + plotW, padT + plotH);
            gx.stroke();
            gx.fillStyle = '#888';
            gx.font = '10px Arial';
            gx.textAlign = 'right';
            gx.fillText(String(maxInf), padL - 4, padT + 8);
            gx.fillText('0', padL - 4, padT + plotH);
            gx.textAlign = 'left';

            let X = t => padL + ((t - t0) / tRange) * plotW;
            let Y = c => padT + plotH - (c / maxInf) * plotH;

            gx.strokeStyle = '#ef4444';
            gx.lineWidth = 1.5;
            gx.beginPath();
            let started = false;
            for (let pt of graphHistory) {
                let px = X(pt.t), py = Y(pt.infected || 0);
                if (!started) { gx.moveTo(px, py); started = true; }
                else gx.lineTo(px, py);
            }
            gx.stroke();
        }

        function updateGraphLegend() {
            let legend = document.getElementById('graphLegend');
            let last = graphHistory.length ? graphHistory[graphHistory.length - 1].counts : {};
            let entries = Object.keys(last).map(n => [n, last[n]]).sort((a, b) => b[1] - a[1]);
            if (entries.length === 0) {
                legend.innerHTML = '<span style="color:#666">No goblets</span>';
                return;
            }
            legend.innerHTML = entries.map(([n, c]) =>
                `<span class="leg"><span class="dot" style="background:${nameColor(n)}"></span>${n} (${c})</span>`
            ).join('');
        }

        document.getElementById('graphsBtn').addEventListener('click', () => {
            graphVisible = !graphVisible;
            document.getElementById('graphPanel').style.display = graphVisible ? 'block' : 'none';
            document.getElementById('graphsBtn').classList.toggle('active', graphVisible);
            if (graphVisible) { drawGraph(); drawInfectedGraph(); updateGraphLegend(); }
        });

        function gameLoop() {
            let now = performance.now();
            let realDelta = (now - lastTime) / 1000;
            lastTime = now;
            realDelta = Math.min(realDelta, 0.1);

            if (!paused) {
                let simTime = realDelta * simSpeed;
                let steps = Math.min(Math.max(1, Math.ceil(simTime / FIXED_DT)), MAX_STEPS_PER_FRAME);
                let dt = simTime / steps;
                for (let i = 0; i < steps; i++) {
                    update(dt);
                }
            }

            render();
            updateInspector();
            sampleGraph();
            if (graphVisible) { drawGraph(); drawInfectedGraph(); updateGraphLegend(); }
            requestAnimationFrame(gameLoop);
        }

        loadAssets().then(() => {
            setupWorld();
            buildSpeedControls();
            gameLoop();
        });
    </script>
</body>
</html>
